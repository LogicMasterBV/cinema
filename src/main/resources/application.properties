spring.application.name=cinema
server.port=8080

# ===============================

# DataSource (PostgreSQL)

# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/cinema

spring.datasource.username=admin

spring.datasource.password=admin

spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================

# JPA / Hibernate

# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# Logging (optional but super useful)

# ===============================

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.jwt.secret=nZcYkzPzYbX4yXb6vV0Z2hL5pF2j9TgkX2Jd0RkL3M8=
spring.jwt.expiration=900000
spring.servlet.multipart.enabled=true